name: Daily Job Finder Automation

on:
  schedule:
    # Runs everyday at 1:30 AM UTC (which corresponds to 7:00 AM IST)
    - cron: '30 1 * * *'
  workflow_dispatch: # Allows you to manually trigger it via the Actions tab anytime

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        # Removed the cache line to fix the missing requirements.txt error

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests gspread oauth2client

    - name: Execute Scraper Engine
      env:
        SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      run: python job_scraper.py
